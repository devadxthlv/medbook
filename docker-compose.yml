version: "3.9"

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: medbook_db
      MYSQL_USER: medbook_user
      MYSQL_PASSWORD: secure-password-here
      MYSQL_ROOT_PASSWORD: root-password-here
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: medbook.settings.production
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: medbook_db
      DB_USER: medbook_user
      DB_PASSWORD: secure-password-here
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn medbook.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      - web

volumes:
  mysql_data:
  media_data:
  static_data:
