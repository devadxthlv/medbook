{% extends "base.html" %}

{% block title %}Password Reset Complete — MedBook{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <i class="bi bi-check-circle display-1 text-success"></i>
            <h2 class="fw-bold mt-3">Password Reset Complete</h2>
            <p class="text-muted">Your password has been set. You can now log in with your new password.</p>
            <a href="{% url 'accounts:login' %}" class="btn btn-primary">Login</a>
        </div>
    </div>
</div>
{% endblock %}
