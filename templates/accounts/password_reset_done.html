{% extends "base.html" %}

{% block title %}Password Reset Sent — MedBook{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <i class="bi bi-envelope-check display-1 text-success"></i>
            <h2 class="fw-bold mt-3">Check Your Email</h2>
            <p class="text-muted">If an account exists with the email you entered, we've sent a password reset link.</p>
            <a href="{% url 'accounts:login' %}" class="btn btn-primary">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
