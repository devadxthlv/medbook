{% extends "base.html" %}

{% block title %}Password Reset — MedBook{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="fw-bold text-center mb-3">Reset Password</h2>
                    <p class="text-muted text-center">Enter your email address and we'll send you a link to reset your password.</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_email" class="form-label">Email address</label>
                            <input type="email" name="email" id="id_email" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                    </form>
                    <p class="text-center mt-3 mb-0">
                        <a href="{% url 'accounts:login' %}" class="text-decoration-none">Back to login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
