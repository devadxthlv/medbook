limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

upstream medbook {
    server web:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name 3-27-246-227.nip.io medbook.3-27-246-227.nip.io 3.27.246.227.nip.io 3.27.246.227;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://3-27-246-227.nip.io$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 3-27-246-227.nip.io medbook.3-27-246-227.nip.io 3.27.246.227.nip.io;
    server_tokens off;
    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/3-27-246-227.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/3-27-246-227.nip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Content-Security-Policy slightly relaxed for inline styles/scripts in typical Django admin/templates
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' data:;" always;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /health/ {
        proxy_pass http://medbook;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        limit_req zone=mylimit burst=20 nodelay;
        proxy_pass http://medbook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_redirect off;
    }
}
